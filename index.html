document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1y_reset:'Сбросить всё'\n    },\n    en: {\n      brand:'Julia · English', nav_cta:'Message on WhatsApp',\n      hero_eyebrow:'English · Tel Aviv · online & in-person',\n      hero_h1a:'Speak English ', hero_h1em:'naturally', hero_h1b:', like a sunset by the sea',\n      hero_sub:'15 years of teaching, a degree in translation — and zero memorization. Just real conversation, clear pronunciation, and a program built around your goals.',\n      hero_btn1:'Message Julia →', hero_btn2:'Learn more',\n      stat1:'years of teaching', stat2:'from zero to Proficiency', stat3_b:'kids / adults', stat3:'personalized program',\n      about_eyebrow:'About me', about_cap:'Julia Velitskaya',\n      about_h2:'English has been my passion since the age of three — and I still can’t stop',\n      about_quote:'“I want grammar to become your friend, not your punishment”',\n      about_p:'I graduated with a degree in translation and foreign language teaching. I’ve been teaching English to children and adults for over 15 years — starting back at school. I love animals, the sea, sunsets, cheesecake, and photography — and you can feel it in how lessons go: relaxed, alive, and genuinely real.',\n      fact1:'Degree in translation and foreign language teaching',\n      fact2:'Experience with school students, adults, and exam preparation',\n      fact3:'Individual pace and program tailored to each student',\n      whom_eyebrow:'Who the lessons are for', whom_h2:'Three common scenarios students come with',\n      journal_eyebrow:'What happens in lessons', journal_h2:'Real conversation instead of memorization',\n      levels_h3:'A program for you — from zero to Proficiency',\n      levels_p:'Pace and program are chosen individually: aligned to your school curriculum, international exam, job interview — or simply the joy of language.',\n      goal_prefix:'Your goal:', goal_placeholder:'choose a level above', goal_btn_prefix:'Message Julia about', goal_btn_code:'this level', goal_wa_msg:'Hi Julia! I want to reach level ',\n      barriers_eyebrow:'Ready to start?', barriers_h2:'What’s your main challenge right now?', barriers_btn:'Message on WhatsApp: 053-321-8905 →',\n      footer_p:'Tel Aviv · online & in-person · WhatsApp 053-321-8905',\n      a11y_title:'Accessibility', a11y_fontsize:'Font size', a11y_contrast:'High contrast', a11y_grayscale:'Grayscale', a11y_links:'Highlight links', a11y_anim:'Stop animations', a11y_dyslexia:'Readable font', a11y_reset:'Reset all'\n    }\n  };\n\n  CARDS = [\n    { mark:'01',\n      ru:{ title:'Школьникам', desc:'Разбираем школьную программу, закрываем пробелы и готовим базу для багрута — без паники перед контрольными.',\n        details:['Разбираем сложные темы школьной программы — времена, косвенную речь, конструкции, которые путают на контрольных.','Готовлю к багруту: модули 3, 4 и 5 — формат экзамена, типовые задания, тайминг и типичные ошибки.','Работаем с реальными домашними заданиями и темами, которые сейчас проходят в классе, а не с абстрактными упражнениями.','Беру учеников от начальной школы до выпускных классов — с учётом возраста и уровня.'] },\n      en:{ title:'School students', desc:'We cover the school curriculum, fill in the gaps, and build a solid foundation for the Bagrut — without pre-test panic.',\n        details:['We work through challenging curriculum topics — tenses, indirect speech, structures that trip students up on tests.','Bagrut preparation: modules 3, 4 and 5 — exam format, typical tasks, timing, and common mistakes.','We work with actual homework and topics being covered in class right now — not abstract textbook exercises.','I teach students from primary school through graduation, adapting to age and level.'] } },\n    { mark:'02',\n      ru:{ title:'Взрослым', desc:'Снимаем языковой барьер и учимся получать удовольствие от общения на английском — на работе и в поездках.',\n        details:['Работаем со страхом ошибиться и звучать «глупо» — это первое, что мешает начать говорить, раньше грамматики.','Готовим разговорный английский для работы: собеседования, переписка с коллегами, презентации.','Разбираем бытовые ситуации: аэропорт, врач, банк, разговор с соседями — язык, который реально нужен в жизни.','Гибкое расписание под занятого взрослого — без привязки к жёсткому учебнику и темпу класса.'] },\n      en:{ title:'Adults', desc:'We break down the language barrier and learn to enjoy communicating in English — at work and while traveling.',\n        details:['We tackle the fear of making mistakes and sounding “stupid” — this blocks speaking even before grammar does.','We build conversational English for work: interviews, correspondence with colleagues, presentations.','We cover everyday situations: airport, doctor, bank, talking to neighbors — the language you actually need in life.','Flexible scheduling for a busy adult — no rigid textbook pace or classroom tempo.'] } },\n    { mark:'03',\n      ru:{ title:'Тем, кто хочет свободы', desc:'Для всех, кто хочет говорить свободно и уверенно — без привязки к учебнику, на реальных, живых темах.',\n        details:['Говорим на темы, которые реально интересны: фильмы, новости, увлечения — а не тема из учебника «Мой город».','Работаем над естественностью речи: идиомы, разговорные обороты и юмор вместо «книжного» английского.','Готовим к переезду или жизни за границей — понимание живой, быстрой разговорной речи, а не дикторского английского.','Тренируем уверенность в разговоре: на встречах, конференциях, в путешествиях — без ступора перед незнакомой темой.'] },\n      en:{ title:'Those who want fluency', desc:'For anyone who wants to speak freely and confidently — off the textbook, on real and engaging topics.',\n        details:['We talk about things that genuinely interest you: films, news, hobbies — not a textbook unit called “My City”.','We work on naturalness: idioms, colloquial phrases, and humor instead of “textbook” English.','Preparing for relocation or life abroad — understanding fast, natural spoke
